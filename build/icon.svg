<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1f3a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>

  <!-- Photo card -->
  <g filter="url(#shadow)">
    <rect x="232" y="280" width="560" height="464" rx="56" ry="56" fill="#ffffff"/>
  </g>

  <!-- Clip the scene inside the photo card -->
  <clipPath id="card">
    <rect x="232" y="280" width="560" height="464" rx="56" ry="56"/>
  </clipPath>
  <g clip-path="url(#card)">
    <!-- Sun -->
    <circle cx="372" cy="408" r="58" fill="#ffd166"/>
    <!-- Mountains -->
    <path d="M232 744 L420 470 L560 660 L660 540 L792 744 Z" fill="url(#mtn)"/>
    <path d="M232 744 L560 470 L792 744 Z" fill="#3f5fd6" opacity="0.85"/>
  </g>
</svg>
